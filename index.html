<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Interactive Shopping List</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="script.js" defer></script>
</head>
<body>
  <main class="container">
    <h1>Shopping List</h1>

    <div class="controls">
      <input id="item-input" type="text" placeholder="Add an item…" aria-label="New item" />
      <button id="add-btn" type="button">Add</button>
    </div>

    <ul id="list" class="list" aria-live="polite"></ul>
  </main>
</body>
</html>
